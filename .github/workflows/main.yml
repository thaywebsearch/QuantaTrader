# ══════════════════════════════════════════════════════════════
#  QuantaTrader — GitHub Actions CI (sem chaves de API)
#  Valida apenas o streamlit_demo.py que é 100% autónomo
# ══════════════════════════════════════════════════════════════

name: QuantaTrader CI/CD

on:
  push:
    branches: ["main", "develop"]
    tags:     ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"

jobs:

  # ── validação de sintaxe (sem deps, instantâneo) ───────────
  syntax:
    name: "⚡ Sintaxe Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Verificar sintaxe — streamlit_demo.py
        run: |
          python -m py_compile streamlit_demo.py
          echo "✅ streamlit_demo.py — sintaxe válida"

      - name: Verificar que .env não está commitado
        run: |
          if git ls-files | grep -qE "^\.env$"; then
            echo "::error::⚠️  Ficheiro .env encontrado! Remove-o do repositório."
            exit 1
          fi
          echo "✅ .env não versionado"

  # ── instalar deps do demo e testar import ─────────────────
  demo_check:
    name: "🎯 Demo Streamlit (sem API keys)"
    runs-on: ubuntu-latest
    needs: syntax

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Instalar dependências do demo
        run: pip install streamlit pandas numpy plotly

      - name: Verificar imports do demo
        run: |
          python -c "
          import streamlit, pandas, numpy, plotly
          print('✅ streamlit', streamlit.__version__)
          print('✅ pandas',    pandas.__version__)
          print('✅ numpy',     numpy.__version__)
          print('✅ plotly',    plotly.__version__)
          "

      - name: Lint rápido com ruff
        run: |
          pip install ruff
          ruff check streamlit_demo.py --select E,F --ignore E501 || true
          echo "✅ Lint concluído"

  # ── segurança: verifica chaves hardcoded ──────────────────
  security:
    name: "🔒 Segurança"
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - name: Procurar chaves hardcoded
        run: |
          if grep -rE "(AKIA|sk-ant-|pk_live_)[A-Za-z0-9]+" streamlit_demo.py 2>/dev/null; then
            echo "::error::🚨 Possível chave de API hardcoded!"
            exit 1
          fi
          echo "✅ Nenhuma chave hardcoded encontrada"

      - name: Confirmar modo demo ativo
        run: |
          if grep -q "DEMO MODE" streamlit_demo.py; then
            echo "✅ Banner de demo presente"
          else
            echo "::warning::Banner de demo não encontrado"
          fi

  # ── release automático em tags v*.*.* ────────────────────
  release:
    name: "🚀 GitHub Release"
    runs-on: ubuntu-latest
    needs: [syntax, demo_check, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar pacote de release
        run: |
          zip -r quanta-trader-${{ github.ref_name }}.zip \
            streamlit_demo.py \
            requirements.txt \
            README.md \
            .gitignore

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuantaTrader ${{ github.ref_name }}"
          body: |
            ## ⚡ QuantaTrader ${{ github.ref_name }}

            ### 🎯 Demo sem chaves de API
            ```bash
            pip install streamlit pandas numpy plotly
            streamlit run streamlit_demo.py
            ```

            ### 🔑 Versão completa (requer chaves Alpaca + Anthropic)
            ```bash
            pip install -r requirements.txt
            cp .env.example .env
            python quanta_trader.py
            ```
          files: quanta-trader-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
